allow_embedding: false
db_schema:
  entries:
    client: none
    columns:
    - admin_ui: {width: 200}
      client_hidden: false
      name: user
      target: users
      type: link_single
    - admin_ui: {width: 200}
      client_hidden: false
      name: title
      type: string
    - admin_ui: {width: 200}
      client_hidden: false
      name: body
      type: string
    - admin_ui: {width: 200}
      client_hidden: false
      name: tags
      type: simpleObject
    - admin_ui: {width: 200}
      client_hidden: false
      name: created_on
      type: datetime
    server: full
    title: entries
  user_stats:
    client: none
    columns:
    - admin_ui: {width: 200}
      client_hidden: false
      name: user
      target: users
      type: link_single
    - admin_ui: {width: 200}
      client_hidden: false
      name: current_streak
      type: number
    - admin_ui: {width: 200}
      client_hidden: false
      name: longest_streak
      type: number
    - admin_ui: {width: 200}
      client_hidden: false
      name: streak_started
      type: datetime
    - admin_ui: {width: 200}
      client_hidden: false
      name: first_entry
      type: datetime
    - admin_ui: {width: 200}
      client_hidden: false
      name: total_entries
      type: number
    - admin_ui: {order: 6, width: 200}
      client_hidden: false
      name: celebrated_30
      type: bool
    - admin_ui: {order: 7, width: 200}
      client_hidden: false
      name: celebrated_50
      type: bool
    server: full
    title: user_stats
  users:
    client: full
    columns:
    - admin_ui: {width: 200}
      client_hidden: false
      name: username
      type: string
    - admin_ui: {width: 200}
      client_hidden: false
      name: email
      type: string
    - admin_ui: {width: 200}
      client_hidden: false
      name: enabled
      type: bool
    - admin_ui: {width: 200}
      client_hidden: false
      name: last_login
      type: datetime
    - admin_ui: {width: 200}
      client_hidden: false
      name: password_hash
      type: string
    - admin_ui: {width: 200}
      client_hidden: false
      name: n_password_failures
      type: number
    - admin_ui: {width: 200}
      client_hidden: false
      name: confirmed_email
      type: bool
    - admin_ui: {width: 200}
      client_hidden: false
      name: signed_up
      type: datetime
    - admin_ui: {width: 200}
      client_hidden: false
      name: email_confirmation_key
      type: string
    server: full
    title: Users
  word_bank:
    client: none
    columns:
    - admin_ui: {width: 200}
      client_hidden: false
      name: word
      type: string
    - admin_ui: {width: 200}
      client_hidden: false
      name: category
      type: string
    server: full
    title: word_bank
metadata: {description: Writing down a problem solves half of it., logo_img: 'asset:Screenshot 2026-03-17 023923.png', title: Kidlin's Journal}
name: tigercode-app
native_deps:
  head_html: |-
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
package_name: tigercode_app
runtime_options:
  client_version: '3'
  legacy_features: {bootstrap3: true, class_names: true}
  server_spec: {base: python310-minimal}
  version: 3
services:
- client_config: {}
  server_config: {}
  source: /runtime/services/tables.yml
- client_config: {allow_signup: false, confirm_email: true, enable_automatically: true, use_email: true}
  server_config:
    email_content:
      confirm_address:
        html: |-
          <p>Thanks for registering your account with us. Please click the following link to confirm that this is your account:</p>
          <p>{{confirm_link}}</p>
          <p>Thanks,</p>
          <p>The team</p>
      reset_password:
        html: |-
          <p>Hi there,</p>
          <p>You have requested a password reset for your account {{email}}. To reset your password, click the link below:</p>
          <p>{{reset_link}}</p>
          <p>This link will expire in ten minutes.</p>
    user_table: users
  source: /runtime/services/anvil/users.yml
startup: {module: CreateAccount, type: form}
startup_form: null
